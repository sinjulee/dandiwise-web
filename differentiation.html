<style>

.fade-up {

  transform: translateY(36px);
  transition: all 0.8s ease;
}
.fade-up.show {
  opacity: 1;
  transform: translateY(0);
}

.card {

/* 바텀시트 애니메이션 */
.modal-box {
  animation: sheetUp 1s ease forwards;
}
@keyframes sheetUp {
  from {
    transform: translateY(80px);
    opacity: 0;
  }
  to {
    transform: translateY(0);
    opacity: 1;
  }
}
</style>

<script>

      <button type="button" onclick="openModal('diff_6')"

<!-- 바텀시트 모달 -->
<div id="modal" class="fixed inset-0 bg-black/55 hidden items-end justify-center z-[100] px-4 pb-0 md:pb-6">
  <div class="modal-box bg-white w-full max-w-2xl rounded-t-3xl md:rounded-3xl shadow-2xl relative overflow-hidden">
    <div class="bg-brand-blue px-8 py-6 text-white">
      <button onclick="closeModal()"
        class="absolute top-5 right-5 text-white/80 hover:text-white text-xl leading-none">
        ✕
      </button>
      <p id="modal-kicker" class="text-sm font-bold tracking-[0.15em] text-blue-200 uppercase mb-2"></p>
      <h3 id="modal-title" class="text-2xl md:text-3xl font-black"></h3>
    </div>

    <div class="flex justify-center pt-3 bg-white">
      <div class="w-12 h-1.5 rounded-full bg-gray-300"></div>
    </div>

    <div class="p-8 md:p-10 max-h-[72vh] overflow-y-auto">
      <div id="modal-image" class="mb-6 hidden">
        <img id="modal-image-tag" src="" alt="" class="w-full h-auto rounded-xl border border-gray-200">
      </div>

      <div id="modal-body" class="text-gray-700 leading-relaxed whitespace-pre-line text-[15px] md:text-base"></div>
    </div>
  </div>
</div>

<script>
/* 스크롤 등장 애니메이션 */
const observer = new IntersectionObserver((entries) => {
  entries.forEach((entry) => {
    if (entry.isIntersecting) {
      entry.target.classList.add('show');
    }
  });
}, { threshold: 0.15 });

document.querySelectorAll('.fade-up').forEach((el) => observer.observe(el));

/* 모달 데이터 */
const modalData = {
  target_food: {
    kicker: 'Target Market',
    title: '식품 제조 업체',
    body: `식품 제조 후 공급 영역에 대한 물류서비스를 제공하고, 안정적인 물류와 유통 관리 영역을 하고자 합니다.`,
    image: ''
  },
  target_ecom: {
    kicker: 'Target Market',
    title: '전자상거래 (E-commerce)',
    body: `온라인 쇼핑몰, 플랫폼 기업과의 협업을 통해 물류 대행 영역의 서비스를 집중적으로 수행하여, 매출 증가와 고객 유입을 극대화합니다.`,
    image: ''
  },
  target_distribution: {
    kicker: 'Target Market',
    title: '유통 대행 영역',
    body: `식품 및 식자재 영역의 다양한 수·출입에 대한 물류 영역 서비스를 제공합니다.

통관대행, 창고운영, 재고, 인력, 배송, 납품 등 물류 대행 영역 전반을 수행합니다.

3PL (Third Party Logistics)
공장물류, 유통물류, 납품대행, 운송대행 전 영역에서 창고, 인력, 배송차량의 물류 서비스 Operation을 제공합니다.`,
    image: ''
  },
  target_global: {
    kicker: 'Target Market',
    title: '해외 상품 소싱',
    body: `당사의 식자재 및 식품 소싱을 통하여 대기업 유통사 또는 공급 시장에서 역할을 수행합니다.

상품 구매 및 공급대행
글로벌소싱 (Global Sourcing)

해외 또는 국내 식품 및 식자재 구매·판매대행을 통하여 공급시장에서 역할을 수행합니다.`,
    image: ''
  },

  diff_1: {
    kicker: 'Differentiation',
    title: '대응 역량 보유',
    body: `기존의 식자재 기업의 인력 공급과 차량 운영 노하우 역량을 보유하고 있으며, 고도화된 인력과 차량 운영 기반을 갖추고 있습니다.`,
    image: ''
  },
  diff_2: {
    kicker: 'Differentiation',
    title: '전문적 관리 기업',
    body: `당사 경영진들의 식자재 및 식품 분야 노하우와 역량을 통하여 높은 수준의 물류관리 서비스를 제공합니다.`,
    image: ''
  },
  diff_3: {
    kicker: 'Differentiation',
    title: '통합 물류관리 솔루션 제공',
    body: `물류 공급 채널 및 식자재 기업 물류 관리 SYSTEM 이해와 자체 관리 시스템을 통한 안정적 물류관리 솔루션을 제공합니다.`,
    image: ''
  },
  diff_4: {
    kicker: 'Differentiation',
    title: '판매 기회 제공 및 역할 수행',
    body: `당사만의 식자재 기업 구매(매입)팀 차별화 네트워킹을 통하여 화주사 상품 등록 및 추가 판매 기회 연결, 그리고 판로 역할을 수행합니다.`,
    image: ''
  },
  diff_5: {
    kicker: 'Differentiation',
    title: '대기업 관리자 출신 구성원',
    body: `대기업 물류 관리자 출신이 3PL 영역을 수행함으로써 기존 식자재 기업 물류담당자들과 즉각적인 소통관리가 가능합니다.`,
    image: ''
  },
  diff_6: {
    kicker: 'Differentiation',
    title: '안정적 납품 사후관리',
    body: `최종 납품 이후 발생하는 문제점에 대하여 식자재 대기업의 CS(고객서비스센터)와 긴밀하게 대응하고 역할을 수행합니다.`,
    image: ''
  }
};

function openModal(key) {
  const data = modalData[key];
  if (!data) return;

  document.getElementById('modal-kicker').textContent = data.kicker;
  document.getElementById('modal-title').textContent = data.title;
  document.getElementById('modal-body').textContent = data.body;

  const imageWrap = document.getElementById('modal-image');
  const imageTag = document.getElementById('modal-image-tag');

  if (data.image) {
    imageWrap.classList.remove('hidden');
    imageTag.src = data.image;
    imageTag.alt = data.title;
  } else {
    imageWrap.classList.add('hidden');
    imageTag.src = '';
    imageTag.alt = '';
  }

  const modal = document.getElementById('modal');
  modal.classList.remove('hidden');
  modal.classList.add('flex');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  const modal = document.getElementById('modal');
  modal.classList.add('hidden');
  modal.classList.remove('flex');
  document.body.style.overflow = '';
}

/* 배경 클릭 닫기 */
document.getElementById('modal').addEventListener('click', (e) => {
  if (e.target.id === 'modal') closeModal();
});

/* ESC 닫기 */
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closeModal();
});
</script>

</body>
